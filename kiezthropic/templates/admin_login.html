<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Kiezthropic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a0a2e; color: #f0e6ff;
      height: 100dvh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: #2d1a4e; border: 1px solid #6b3fa0; border-radius: 1rem;
      padding: 2rem; width: min(360px, 90vw); display: flex; flex-direction: column; gap: 1rem;
    }
    h1 { color: #e0b0ff; font-size: 1.2rem; }
    input[type=password] {
      padding: 0.6rem 0.9rem; border-radius: 0.5rem;
      border: 1px solid #6b3fa0; background: #1a0a2e; color: #f0e6ff;
      font-size: 1rem; outline: none; width: 100%;
    }
    input[type=password]:focus { border-color: #b06de0; }
    button {
      padding: 0.65rem; background: #6b3fa0; color: #fff;
      border: none; border-radius: 0.5rem; cursor: pointer;
      font-size: 1rem; font-weight: 600;
    }
    button:hover { background: #8b5fc0; }
    .error { color: #ff8080; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔐 Corrections Admin</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Password" autofocus />
      <br><br>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
