<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiezthropic — Kiez Burn Wiki Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a0a2e;
      color: #f0e6ff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      background: #2d0a5e;
      border-bottom: 1px solid #6b3fa0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #e0b0ff; }
    header span { font-size: 0.85rem; color: #a070d0; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #6b3fa0;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #2d1a4e;
      color: #f0e6ff;
      border-bottom-left-radius: 0.25rem;
    }
    .msg.assistant.streaming { opacity: 0.85; }
    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: #2d0a5e;
      border-top: 1px solid #6b3fa0;
    }
    #input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid #6b3fa0;
      background: #1a0a2e;
      color: #f0e6ff;
      font-size: 1rem;
      outline: none;
    }
    #input:focus { border-color: #b06de0; }
    #send {
      padding: 0.65rem 1.25rem;
      background: #6b3fa0;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    #send:hover { background: #8b5fc0; }
    #send:disabled { background: #3d2060; cursor: not-allowed; }
    .welcome {
      text-align: center;
      color: #7050a0;
      margin: auto;
      padding: 2rem;
    }
    .welcome h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #b06de0; }
  </style>
</head>
<body>
  <header>
    <h1>🔥 Kiezthropic</h1>
    <span>Ask anything about Kiez Burn 2026</span>
  </header>
  <div id="messages">
    <div class="welcome">
      <h2>Welcome to the Kiez Burn Wiki Chat</h2>
      <p>Ask me about the event, camps, principles, timeline, or anything else!</p>
    </div>
  </div>
  <div id="input-row">
    <input id="input" type="text" placeholder="Ask about Kiez Burn…" autocomplete="off" />
    <button id="send">Send</button>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function appendMsg(role, text = '') {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant') div.classList.add('streaming');
      div.textContent = text;
      // Remove welcome message on first interaction
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendBtn.disabled = true;

      appendMsg('user', text);
      const replyEl = appendMsg('assistant');

      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            try {
              const { text: token } = JSON.parse(payload);
              replyEl.textContent += token;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } catch (_) {}
          }
        }
      } catch (err) {
        replyEl.textContent = `Error: ${err.message}`;
      }
      replyEl.classList.remove('streaming');
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
